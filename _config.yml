# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Samwei12's blog
subtitle: Stay hungry, stay foolish
description: Stay hungry, stay foolish
author: Samwei12
language: zh-Hans
email: samwei12@icloud.com
timezone:

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: http://samwei12.github.io
# url: http://samwei12.gitcafe.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: true
  tab_replace: true
  
# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date
  
# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Archives
## 2: Enable pagination
## 1: Disable pagination
## 0: Fully Disable
archive: 2 #设置为1 是全部展示
category: 2
tag: 2


# Server
port: 4000 #本地服务器端口是4000
server_ip: 127.0.0.1 #本地服务器地址
logger: false
logger_format: dev

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: next

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
  type: git
  # repo: https://gitcafe.com/samwei12/samwei12.git
  # branch: gitcafe-pages
  # repo: https://github.com/samwei12/samwei12.github.io.git
  repo: git@github.com:samwei12/samwei12.github.io.git
  branch: master

# Markdown语法
## https://github.com/chjj/marked
markdown:
  gfm: true
  pedantic: false
  sanitize: false
  tables: true
  breaks: true
  smartLists: true
  smartypants: true

# 插件列表
plugins:
# rss
- hexo-generator-feed
# site map
- hexo-generator-sitemap
- hexo-generator-baidu-sitemap

# RSS
feed:
    type: atom
    path: atom.xml
    # 用于限制 RSS 中初始多少 feed
    limit: 20

sitemap:
    path: sitemap.xml
# baidu
baidusitemap:
    path: sitemap.xml

